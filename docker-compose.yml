services:
  db:
    image: postgres:14
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      # ONLY localhost — never expose DB to the internet
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      CLIENT_APP_BASE: ${CLIENT_APP_BASE}
    depends_on:
      db:
        condition: service_healthy
    ports:
      # ONLY localhost — nginx will proxy
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      # Frontend only needs public URLs, not backend secrets
      REACT_APP_API_URL: ${PUBLIC_API_BASE}
    depends_on:
      - backend
    ports:
      # ONLY localhost
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"

volumes:
  pgdata:
